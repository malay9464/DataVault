<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Related Records — All Files | Data Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/related-all.css">
</head>
<body>

<div class="top-header">
    <div class="hdr-left">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        Data Vault
    </div>
    <a class="back-btn" href="/">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Files
    </a>
</div>

<div class="page-wrap">

    <div class="page-title">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Related Records — All Files
        </h1>
        <p>Duplicate contacts grouped by shared email or phone across all your uploaded files</p>
    </div>

    <!-- STATS -->
    <div class="stat-grid">
        <div class="stat-card"><div class="si si-blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div><div><div class="sv" id="sTF">—</div><div class="sl">Files Scanned</div></div></div>
        <div class="stat-card"><div class="si si-green"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div><div><div class="sv" id="sEG">—</div><div class="sl">Email Groups</div></div></div>
        <div class="stat-card"><div class="si si-purple"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.82 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14v2.92z"/></svg></div><div><div class="sv" id="sPG">—</div><div class="sl">Phone Groups</div></div></div>
        <div class="stat-card"><div class="si si-orange"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div><div><div class="sv" id="sBG">—</div><div class="sl">Email + Phone Groups</div></div></div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <!-- FILE filter (all users) -->
        <div class="fg">
            <span class="fl">File</span>
            <select class="fs" id="fUp" style="min-width:210px;"><option value="">All Files</option></select>
        </div>

        <!-- CATEGORY filter (regular users only) -->
        <div class="fg" id="categoryWrap" style="display:none;">
            <span class="fl">Category</span>
            <select class="fs" id="fCat" style="min-width:190px;"><option value="">All Categories</option></select>
        </div>

        <!-- USER filter (admin only) -->
        <div class="fg" id="adminWrap" style="display:none;">
            <span class="fl">User</span>
            <select class="fs" id="fUsr" style="min-width:190px;" onchange="loadFiles()"><option value="">All Users</option></select>
        </div>

        <div class="cdiv"></div>
        <div class="fg">
            <span class="fl">View</span>
            <div class="view-toggle">
                <button class="vbtn active" id="vKey" onclick="setView('key')">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    By Match Key
                </button>
                <button class="vbtn" id="vFile" onclick="setView('file')">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                    By File
                </button>
            </div>
        </div>
        <div class="factions">
            <button class="btn-a" onclick="applyFilters()">Apply</button>
            <button class="btn-r" onclick="resetFilters()">Reset</button>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" data-t="all"    onclick="setTab('all',this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>All <span class="tbadge" id="tAll">—</span></button>
        <button class="tab" data-t="email"  onclick="setTab('email',this)">📧 Email Only <span class="tbadge" id="tEmail">—</span></button>
        <button class="tab" data-t="phone"  onclick="setTab('phone',this)">📱 Phone Only <span class="tbadge" id="tPhone">—</span></button>
        <button class="tab" data-t="merged" onclick="setTab('merged',this)">🔗 Both <span class="tbadge" id="tMerged">—</span></button>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <span class="ri" id="ri">Loading…</span>
        <select class="ss" id="sortSel" onchange="load()">
            <option value="size-desc">Most Records First</option>
            <option value="size-asc">Fewest Records First</option>
            <option value="alpha">Alphabetical</option>
        </select>
    </div>

    <div id="content"></div>
    <div class="pag" id="pag"></div>
</div>

<div id="tc"></div>

<script src="/static/js/related-all.js"></script>
</body>
</html>
